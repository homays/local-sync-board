<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Sync Board</title>
    <style>
        /* CSS Reset & Normalization */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 10px 36px 0 rgba(30, 64, 175, 0.2);
            --text-primary: #f7fbff;
            --text-secondary: rgba(247, 251, 255, 0.88);
            --accent-color: rgba(255, 255, 255, 0.2);
            --accent-hover: rgba(255, 255, 255, 0.3);
            --message-bg: rgba(9, 44, 108, 0.2);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0a274d;
            color: var(--text-primary);
        }

        body.bg-gradient {
            background:
                radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.42) 0%, rgba(255, 255, 255, 0) 34%),
                radial-gradient(circle at 82% 78%, rgba(14, 165, 233, 0.35) 0%, rgba(14, 165, 233, 0) 42%),
                linear-gradient(120deg, #0ea5e9 0%, #2563eb 52%, #38bdf8 100%);
            background-size: 170% 170%, 210% 210%, 320% 320%;
            animation: gradientBG 22s ease-in-out infinite;
        }

        body.bg-image {
            animation: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 0%, 100% 100%, 0% 50%; }
            50% { background-position: 55% 45%, 45% 55%, 76% 50%; }
            100% { background-position: 0% 0%, 100% 100%, 0% 50%; }
        }

        /* Main Glass Container */
        .container {
            width: 90%;
            max-width: 900px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Header */
        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.14);
        }

        .status {
            font-size: 0.85rem;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .background-setting {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.55rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .background-label {
            font-size: 0.8rem;
            color: rgba(247, 251, 255, 0.9);
            white-space: nowrap;
        }

        .background-toggle {
            display: inline-flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
        }

        .bg-mode-btn {
            border: none;
            background: transparent;
            color: rgba(247, 251, 255, 0.92);
            padding: 0.38rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 58px;
        }

        .bg-mode-btn + .bg-mode-btn {
            border-left: 1px solid rgba(255, 255, 255, 0.22);
        }

        .bg-mode-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
        }

        .bg-mode-btn.active {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.78) 0%, rgba(37, 99, 235, 0.78) 100%);
            color: #fff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.24);
        }

        .bg-mode-btn:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.5);
            outline-offset: -2px;
        }

        button#lang-toggle-btn {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.26);
            padding: 0.5rem 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        button#lang-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .status.connected {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status.disconnected {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        button#clear-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        button#clear-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-1px);
        }

        /* Messages Area */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }

        #messages::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        .message {
            background: var(--message-bg);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 1.25rem;
            position: relative;
            backdrop-filter: blur(6px);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: slideIn 0.3s ease-out;
            max-width: 100%;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(5, 21, 58, 0.22);
            background: rgba(9, 44, 108, 0.26);
        }

        .message-content {
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            white-space: pre-wrap;
            margin-bottom: 2rem;
            font-size: 1rem;
            line-height: 1.7;
            color: rgba(248, 252, 255, 0.98);
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
            word-break: break-word;
        }

        .message-content.image-content {
            margin-bottom: 1.4rem;
        }

        .message-image {
            display: block;
            max-width: 100%;
            max-height: 360px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 24px rgba(2, 10, 34, 0.35);
            cursor: zoom-in;
        }

        .message-meta {
            position: absolute;
            bottom: 0.75rem;
            right: 0.75rem;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .timestamp {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            color: #f5fbff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .copy-btn.copied {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.4);
            color: #6ee7b7;
        }

        /* Input Area */
        #input-area {
            padding: 1.5rem 2rem;
            background: rgba(0, 0, 0, 0.06);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            flex-wrap: wrap;
            backdrop-filter: blur(10px);
        }

        textarea {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: #f7fbff;
            resize: none;
            height: 50px;
            font-family: inherit;
            font-size: 0.98rem;
            line-height: 1.4;
            outline: none;
            transition: all 0.2s;
            /* Hide scrollbar for standard look, custom style below */
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        /* Custom Scrollbar for Textarea */
        textarea::-webkit-scrollbar {
            width: 4px;
        }

        textarea::-webkit-scrollbar-track {
            background: transparent;
        }

        textarea::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        textarea::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        textarea:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1);
        }

        textarea::placeholder {
            color: rgba(247, 251, 255, 0.62);
        }

        .pending-image {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.08);
        }

        .pending-image.hidden {
            display: none;
        }

        .pending-image-preview {
            width: 68px;
            height: 68px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 16px rgba(2, 10, 34, 0.25);
        }

        .pending-image-meta {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            font-size: 0.85rem;
            color: rgba(247, 251, 255, 0.9);
        }

        .pending-image-actions {
            margin-left: auto;
            display: flex;
            gap: 0.5rem;
        }

        .pending-image-btn {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.24);
            padding: 0.35rem 0.7rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .pending-image-btn:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        button#send-btn {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0 1.2rem;
            height: 50px;
            min-width: 146px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button#send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            filter: brightness(1.1);
        }

        button#send-btn:active {
            transform: translateY(0);
        }

        button#expand-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 10px;
            padding: 0 1.2rem;
            height: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button#expand-btn:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        .modal-open {
            overflow: hidden;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 8, 16, 0.55);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 999;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .image-modal {
            position: fixed;
            inset: 0;
            background: rgba(8, 8, 16, 0.72);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 999;
            padding: 1.5rem;
        }

        .image-modal.open {
            opacity: 1;
            pointer-events: auto;
        }

        .image-modal-img {
            max-width: min(92vw, 1200px);
            max-height: 86vh;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 22px 60px rgba(2, 10, 34, 0.5);
            cursor: zoom-out;
        }

        .image-modal-close {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: #fff;
            border-radius: 999px;
            padding: 0.45rem 0.85rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .modal-panel {
            width: min(900px, 100%);
            min-height: 70vh;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.34);
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.28);
            color: #fff;
            border-radius: 8px;
            padding: 0.3rem 0.7rem;
            cursor: pointer;
        }

        .expanded-textarea {
            flex: 1;
            margin: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 12px;
            padding: 1rem;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .expanded-textarea:focus {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            padding: 0 1.25rem 1rem;
        }

        .modal-btn {
            border: none;
            border-radius: 10px;
            padding: 0.65rem 1.2rem;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.22);
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 640px) {
            .container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
            }

            header {
                padding: 1rem;
            }

            .header-actions {
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .background-setting {
                width: 100%;
                justify-content: space-between;
            }

            .background-toggle {
                flex: 1;
                justify-content: stretch;
            }

            .bg-mode-btn {
                flex: 1;
            }

            #messages {
                padding: 1rem;
            }

            #input-area {
                padding: 1rem;
            }

            #input-area {
                flex-wrap: wrap;
            }

            textarea {
                width: 100%;
            }

            button#expand-btn,
            button#send-btn {
                height: 46px;
                flex: 1;
            }

            .modal-panel {
                min-height: 85vh;
            }
        }
    </style>
</head>
<body class="bg-image">
    <div class="container">
        <header>
            <div style="display:flex; align-items:center; gap: 1rem;">
                <h1>Local Sync</h1>
                <div id="status" class="status disconnected">Connecting...</div>
            </div>
            <div class="header-actions">
                <div class="background-setting">
                    <span id="background-mode-label" class="background-label">Background</span>
                    <div class="background-toggle" role="group" aria-label="Background mode">
                        <button id="bg-btn-gradient" class="bg-mode-btn" type="button">Gradient</button>
                        <button id="bg-btn-image" class="bg-mode-btn active" type="button">Image</button>
                    </div>
                </div>
                <button id="lang-toggle-btn" type="button" title="Switch language">中文</button>
                <button id="clear-btn" title="Clear History">Clear All</button>
            </div>
        </header>

        <div id="messages">
            <!-- Messages will be inserted here -->
        </div>

        <div id="input-area">
            <textarea id="message-input" placeholder="Type or paste text here... (Enter to send, Shift+Enter for newline)"></textarea>
            <button id="expand-btn" type="button" title="Open larger editor">Expand</button>
            <button id="send-btn">Send</button>
            <div id="pending-image" class="pending-image hidden">
                <img id="pending-image-preview" class="pending-image-preview" alt="Pasted image preview" />
                <div class="pending-image-meta">
                    <div id="pending-image-label">Pasted image ready to send</div>
                </div>
                <div class="pending-image-actions">
                    <button id="pending-image-remove" class="pending-image-btn" type="button">Remove</button>
                </div>
            </div>
        </div>
    </div>

    <div id="editor-modal" class="modal-overlay" aria-hidden="true">
        <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="editor-modal-title">
            <div class="modal-header">
                <h2 id="editor-modal-title" class="modal-title">Expanded Editor</h2>
                <button id="modal-close-btn" type="button" class="modal-close" aria-label="Close expanded editor">Close</button>
            </div>
            <textarea
                id="expanded-input"
                class="expanded-textarea"
                placeholder="Edit long text here... (Enter to send, Shift+Enter for newline)"
            ></textarea>
            <div class="modal-actions">
                <button id="modal-cancel-btn" type="button" class="modal-btn modal-btn-secondary">Cancel</button>
                <button id="modal-send-btn" type="button" class="modal-btn modal-btn-primary">Send</button>
            </div>
        </div>
    </div>

    <div id="image-modal" class="image-modal" aria-hidden="true">
        <button id="image-modal-close" class="image-modal-close" type="button">Close</button>
        <img id="image-modal-img" class="image-modal-img" alt="Preview image" />
    </div>

    <script src="/socket.io/socket.io.js"></script>

                statusConnecting: '连接中...',
                statusConnected: '已连接',
                statusDisconnected: '已断开',
                clearAll: '清空记录',
                clearHistoryTitle: '清空历史',
                clearConfirm: '确认清空所有人的历史记录吗？',
                inputPlaceholder: '在这里输入或粘贴文本...（Enter 发送，Shift+Enter 换行）',
                expand: '放大编辑',
                expandTitle: '打开大编辑框',
                send: '发送',
                expandedEditor: '放大编辑',
                expandedPlaceholder: '在这里编辑长文本...（Enter 发送，Shift+Enter 换行）',
                close: '关闭',
                closeExpandedEditor: '关闭放大编辑框',
                cancel: '取消',
                switchLanguage: '切换语言',
                copy: '复制',
                copied: '已复制！',
                copyFail: '复制失败：',
                openImage: '打开',
                imageAlt: '粘贴的图片',
                imageReady: '图片已就绪，点击发送即可',
                removeImage: '移除',
                imageTooLarge: '图片太大，最大 10MB。',
                imageSendFailed: '图片发送失败。',
                imageInvalid: '无效的图片数据。',
                imageCopyFailed: '复制图片失败。',
                imageCopyRequiresHttps: '复制图片需要 HTTPS 或 localhost。',
                langToggle: 'EN',
                backgroundMode: '背景',
                backgroundGradient: '渐变',
                backgroundImage: '图片',
                htmlLang: 'zh-CN'
            }
        };

        let currentLang = localStorage.getItem('app-lang') || 'zh';
        let backgroundMode = 'image';

        function t(key) {
            return i18n[currentLang][key] || i18n.en[key] || key;
        }

        function updateStatusText() {
            if (connectionState === 'connected') {
                statusEl.textContent = t('statusConnected');
                return;
            }
            if (connectionState === 'disconnected') {
                statusEl.textContent = t('statusDisconnected');
                return;
            }
            statusEl.textContent = t('statusConnecting');
        }

        function applyLanguage() {
            document.documentElement.lang = t('htmlLang');
            document.title = t('pageTitle');
            appTitleEl.textContent = t('appTitle');
            clearBtn.textContent = t('clearAll');
            clearBtn.title = t('clearHistoryTitle');
            inputEl.placeholder = t('inputPlaceholder');
            expandBtn.textContent = t('expand');
            expandBtn.title = t('expandTitle');
            sendBtn.textContent = t('send');
            modalTitleEl.textContent = t('expandedEditor');
            expandedInputEl.placeholder = t('expandedPlaceholder');
            modalCloseBtn.textContent = t('close');
            modalCloseBtn.setAttribute('aria-label', t('closeExpandedEditor'));
            modalCancelBtn.textContent = t('cancel');
            modalSendBtn.textContent = t('send');
            pendingImageLabelEl.textContent = t('imageReady');
            pendingImageRemoveBtn.textContent = t('removeImage');
            backgroundModeLabelEl.textContent = t('backgroundMode');
            backgroundToggleGroup.setAttribute('aria-label', t('backgroundMode'));
            bgGradientBtn.textContent = t('backgroundGradient');
            bgImageBtn.textContent = t('backgroundImage');
            bgGradientBtn.title = t('backgroundGradient');
            bgImageBtn.title = t('backgroundImage');
            langToggleBtn.textContent = t('langToggle');
            langToggleBtn.title = t('switchLanguage');
            updateStatusText();
            messagesEl.querySelectorAll('.copy-btn').forEach((btn) => {
                if (!btn.classList.contains('copied')) {
                    btn.textContent = t('copy');
                }
            });
            messagesEl.querySelectorAll('.open-image-btn').forEach((btn) => {
                btn.textContent = t('openImage');
            });
        }

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('app-lang', currentLang);
            applyLanguage();
        }

        function setPendingImage(dataUrl) {
            pendingImageDataUrl = dataUrl;
            pendingImagePreviewEl.src = dataUrl;
            pendingImageEl.classList.remove('hidden');
        }

        function clearPendingImage() {
            pendingImageDataUrl = null;
            pendingImagePreviewEl.src = '';
            pendingImageEl.classList.add('hidden');
        }

        function applyBackgroundMode() {
            const useImageBackground = backgroundMode === 'image';
            document.body.classList.toggle('bg-image', useImageBackground);
            document.body.classList.toggle('bg-gradient', !useImageBackground);
            bgImageBtn.classList.toggle('active', useImageBackground);
            bgGradientBtn.classList.toggle('active', !useImageBackground);
            bgImageBtn.setAttribute('aria-pressed', String(useImageBackground));
            bgGradientBtn.setAttribute('aria-pressed', String(!useImageBackground));

            if (useImageBackground) {
                const imageUrl = `https://www.loliapi.com/acg/?t=${Date.now()}`;
                document.body.style.backgroundImage = `linear-gradient(rgba(3, 18, 48, 0.42), rgba(3, 18, 48, 0.42)), url("${imageUrl}")`;
            } else {
                document.body.style.backgroundImage = '';
            }
        }

        function setBackgroundMode(mode) {
            backgroundMode = mode === 'gradient' ? 'gradient' : 'image';
            applyBackgroundMode();
        }

        function openImageModal(dataUrl) {
            imageModalImgEl.src = dataUrl;
            imageModalEl.classList.add('open');
            imageModalEl.setAttribute('aria-hidden', 'false');
        }

        function closeImageModal() {
            imageModalEl.classList.remove('open');
            imageModalEl.setAttribute('aria-hidden', 'true');
            imageModalImgEl.src = '';
        }

        // Connection status handling
        socket.on('connect', () => {
            connectionState = 'connected';
            updateStatusText();
            statusEl.classList.remove('disconnected');
            statusEl.classList.add('connected');
        });

        socket.on('disconnect', () => {
            connectionState = 'disconnected';
            updateStatusText();
            statusEl.classList.remove('connected');
            statusEl.classList.add('disconnected');
        });

        // Receiving history
        socket.on('history', (history) => {
            messagesEl.innerHTML = '';
            history.forEach(addMessageToDOM);
            scrollToBottom();
        });

        // Receiving new message
        socket.on('message', (msg) => {
            addMessageToDOM(msg);
            scrollToBottom();
        });

        socket.on('message_error', (payload) => {
            if (payload && payload.reason === 'image-too-large') {
                alert(t('imageTooLarge'));
                return;
            }
            if (payload && payload.reason === 'image-invalid') {
                alert(t('imageInvalid'));
                return;
            }
            alert(t('imageSendFailed'));
        });

        // History cleared
        socket.on('cleared', () => {
            messagesEl.innerHTML = '';
        });

        // Send message logic
        function sendMessage() {
            const text = inputEl.value.trim();
            if (text) {
                socket.emit('message', text);
                inputEl.value = '';
                inputEl.focus();
                return;
            }

            if (pendingImageDataUrl) {
                socket.emit('message', {
                    type: 'image',
                    dataUrl: pendingImageDataUrl
                });
                clearPendingImage();
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function handleImagePaste(event) {
            const clipboard = event.clipboardData;
            if (!clipboard || !clipboard.items) {
                return;
            }

            for (const item of clipboard.items) {
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    event.preventDefault();
                    const file = item.getAsFile();
                    if (!file) {
                        alert(t('imageSendFailed'));
                        return;
                    }

                    if (file.size > MAX_IMAGE_BYTES) {
                        alert(t('imageTooLarge'));
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = () => {
                        setPendingImage(reader.result);
                    };
                    reader.onerror = () => {
                        alert(t('imageSendFailed'));
                    };
                    reader.readAsDataURL(file);
                    return;
                }
            }
        }

        function dataUrlToBlob(dataUrl) {
            const parts = dataUrl.split(',');
            if (parts.length < 2) {
                return null;
            }
            const match = parts[0].match(/data:(image\/[a-zA-Z0-9.+-]+);base64/);
            if (!match) {
                return null;
            }
            const binary = atob(parts[1]);
            const array = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i += 1) {
                array[i] = binary.charCodeAt(i);
            }
            return new Blob([array], { type: match[1] });
        }

        async function copyImageToClipboard(btn, dataUrl) {
            if (!window.isSecureContext) {
                alert(t('imageCopyRequiresHttps'));
                return;
            }

            if (!(navigator.clipboard && window.ClipboardItem)) {
                alert(t('imageCopyFailed'));
                return;
            }

            const blob = dataUrlToBlob(dataUrl);
            if (!blob) {
                alert(t('imageInvalid'));
                return;
            }

            try {
                await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
                btn.textContent = t('copied');
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = t('copy');
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy image:', err);
                alert(t('imageCopyFailed'));
            }
        }

        function openEditorModal() {
            expandedInputEl.value = inputEl.value;
            editorModal.classList.add('open');
            editorModal.setAttribute('aria-hidden', 'false');
            document.body.classList.add('modal-open');
            expandedInputEl.focus();
            expandedInputEl.setSelectionRange(expandedInputEl.value.length, expandedInputEl.value.length);
        }

        function closeEditorModal(syncBack = true) {
            if (syncBack) {
                inputEl.value = expandedInputEl.value;
            }
            editorModal.classList.remove('open');
            editorModal.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('modal-open');
            inputEl.focus();
        }

        function sendFromExpandedEditor() {
            inputEl.value = expandedInputEl.value;
            sendMessage();
            closeEditorModal(false);
            expandedInputEl.value = '';
        }

        expandBtn.addEventListener('click', openEditorModal);
        modalCloseBtn.addEventListener('click', () => closeEditorModal(true));
        modalCancelBtn.addEventListener('click', () => closeEditorModal(true));
        modalSendBtn.addEventListener('click', sendFromExpandedEditor);
        langToggleBtn.addEventListener('click', toggleLanguage);
        bgGradientBtn.addEventListener('click', () => setBackgroundMode('gradient'));
        bgImageBtn.addEventListener('click', () => setBackgroundMode('image'));
        pendingImageRemoveBtn.addEventListener('click', clearPendingImage);
        imageModalCloseBtn.addEventListener('click', closeImageModal);

        expandedInputEl.addEventListener('input', () => {
            inputEl.value = expandedInputEl.value;
        });

        inputEl.addEventListener('paste', (event) => handleImagePaste(event));
        expandedInputEl.addEventListener('paste', (event) => handleImagePaste(event));

        expandedInputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendFromExpandedEditor();
            }
        });

        editorModal.addEventListener('click', (e) => {
            if (e.target === editorModal) {
                closeEditorModal(true);
            }
        });

        imageModalEl.addEventListener('click', (e) => {
            if (e.target === imageModalEl) {
                closeImageModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && editorModal.classList.contains('open')) {
                closeEditorModal(true);
            } else if (e.key === 'Escape' && imageModalEl.classList.contains('open')) {
                closeImageModal();
            }
        });

        // Clear history logic
        clearBtn.addEventListener('click', () => {
            if(confirm(t('clearConfirm'))) {
                socket.emit('clear');
            }
        });

        // Helper: Add message to DOM
        function addMessageToDOM(msg) {
            const div = document.createElement('div');
            div.className = 'message';

            const contentDiv = document.createElement('div');
            const isImage = msg && msg.type === 'image' && msg.dataUrl;

            if (isImage) {
                contentDiv.className = 'message-content image-content';
                const img = document.createElement('img');
                img.className = 'message-image';
                img.src = msg.dataUrl;
                img.alt = t('imageAlt');
                img.loading = 'lazy';
                img.addEventListener('click', () => {
                    openImageModal(msg.dataUrl);
                });
                contentDiv.appendChild(img);
            } else {
                contentDiv.className = 'message-content';
                contentDiv.textContent = msg && typeof msg.content === 'string' ? msg.content : '';
            }

            const metaDiv = document.createElement('div');
            metaDiv.className = 'message-meta';

            const date = msg && msg.timestamp ? new Date(msg.timestamp) : new Date();
            const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const timeSpan = document.createElement('span');
            timeSpan.className = 'timestamp';
            timeSpan.textContent = timeStr;

            metaDiv.appendChild(timeSpan);

            if (isImage) {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn copy-image-btn';
                copyBtn.textContent = t('copy');
                copyBtn.onclick = () => copyImageToClipboard(copyBtn, msg.dataUrl);

                const openBtn = document.createElement('button');
                openBtn.className = 'copy-btn open-image-btn';
                openBtn.textContent = t('openImage');
                openBtn.onclick = () => openImageModal(msg.dataUrl);
                metaDiv.appendChild(copyBtn);
                metaDiv.appendChild(openBtn);
            } else {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = t('copy');
                copyBtn.onclick = () => copyToClipboard(copyBtn, msg.content);
                metaDiv.appendChild(copyBtn);
            }

            div.appendChild(contentDiv);
            div.appendChild(metaDiv);

            messagesEl.appendChild(div);
            scrollToBottom();
        }

        // Helper: Scroll to bottom
        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // Helper: Copy to clipboard
        async function copyToClipboard(btn, text) {
            // Success handler
            const handleSuccess = () => {
                btn.textContent = t('copied');
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = t('copy');
                    btn.classList.remove('copied');
                }, 2000);
            };

            // Error handler
            const handleError = (err) => {
                console.error('Failed to copy:', err);
                alert(t('copyFail') + err);
            };

            // Modern API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                try {
                    await navigator.clipboard.writeText(text);
                    handleSuccess();
                } catch (err) {
                    // If modern API fails (e.g. permissions), try fallback
                    fallbackCopy(text);
                }
            } else {
                // Fallback for non-secure contexts (HTTP)
                fallbackCopy(text);
            }

            function fallbackCopy(text) {
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;

                    // Ensure it's not visible but part of DOM
                    textArea.style.position = "fixed";
                    textArea.style.left = "-9999px";
                    textArea.style.top = "0";

                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();

                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);

                    if (successful) {
                        handleSuccess();
                    } else {
                        handleError('execCommand returned false');
                    }
                } catch (err) {
                    handleError(err);
                }
            }
        }

        applyLanguage();
        applyBackgroundMode();
    </script>
</body>
</html>
